site_name: Портал документации
site_description: Полная документация по проекту "Учёт успеваемости студентов"
site_author: Миронова Ксения
#site_url: https://github.com/mironovak/docs-portal

# Тема оформления
theme:
  name: material
  language: ru
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Переключить на тёмную тему

    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Переключить на светлую тему

# Навигация
nav:
  - Главная: index.md
  - О проекте: about.md
  - Установка: installation.md
  - Использование: usage.md
  - API: api.md

# Дополнительные настройки
markdown_extensions:
  - admonition
  - codehilite
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed
  - pymdownx.emoji

# Плагины
plugins:
  - search
  - git-revision-date-localized:
      type: date